spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/atlas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:atlas_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:REDACTED_DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
