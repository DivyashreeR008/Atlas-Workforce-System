server.port=8002
spring.application.name=payroll-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/atlas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:atlas_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:atlas_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}

# HikariCP Connection Pooling
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Outbox Pattern Configuration
outbox.poll.interval=5000
outbox.max.retries=5
payroll.exchange.name=payroll.exchange
payroll.processed.queue=payroll.processed.queue
payroll.compensation.queue=payroll.compensation.queue
payroll.dlq.name=payroll.dlq
