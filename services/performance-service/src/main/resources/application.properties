spring.application.name=performance-service
server.port=8014

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/atlas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:atlas_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:atlas_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.serialization.write-dates-as-timestamps=false
