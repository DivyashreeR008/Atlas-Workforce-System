version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: REDACTED_DATABASE_PASSWORD
      POSTGRES_DB: atlas_db
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_user -d atlas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: atlas-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: REDACTED_DATABASE_PASSWORD
      MONGO_INITDB_DATABASE: atlas_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - atlas-network

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "6379:6379"
    networks:
      - atlas-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: atlas-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - atlas-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: atlas-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - atlas-network

  api-gateway:
    build: ./services/api-gateway-node
    container_name: atlas-api-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-REDACTED_JWT_SECRET}
      - ALLOWED_ORIGINS=http://localhost:3000
      - AUTH_SERVICE_URL=http://auth-service:8010
      - EMPLOYEE_SERVICE_URL=http://employee-service:8001
      - PAYROLL_SERVICE_URL=http://payroll-service:8002
      - ANALYTICS_SERVICE_URL=http://analytics-service:8003
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
      - ATTENDANCE_SERVICE_URL=http://attendance-service:8005
      - LEAVE_SERVICE_URL=http://leave-service:8006
      - REDIS_URL=redis://redis:6379
    networks:
      - atlas-network
    depends_on:
      - auth-service
      - employee-service
      - payroll-service
      - attendance-service
      - leave-service
      - redis

  auth-service:
    build: ./services/auth-service
    container_name: atlas-auth-service
    ports:
      - "8010:8010"
    environment:
      - JWT_SECRET=${JWT_SECRET:-REDACTED_JWT_SECRET}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-ChangeMe123!}
      - POSTGRES_URL=postgresql://atlas_user:REDACTED_DATABASE_PASSWORD@postgres:5432/atlas_db
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  employee-service:
    build: ./services/employee-python-service
    container_name: atlas-employee-service
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://admin:REDACTED_DATABASE_PASSWORD@mongodb:27017/atlas_db?authSource=admin
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    networks:
      - atlas-network
    depends_on:
      - mongodb
      - rabbitmq

  payroll-service:
    build: ./services/payroll-java-service
    container_name: atlas-payroll-service
    ports:
      - "8002:8002"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/atlas_db
      - SPRING_DATASOURCE_USERNAME=atlas_user
      - SPRING_DATASOURCE_PASSWORD=REDACTED_DATABASE_PASSWORD
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    build: ./services/analytics-python-service
    container_name: atlas-analytics-service
    ports:
      - "8003:8003"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    networks:
      - atlas-network
    depends_on:
      - elasticsearch

  notification-service:
    build: ./services/notification-go-service
    container_name: atlas-notification-service
    ports:
      - "8004:8004"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    networks:
      - atlas-network
    depends_on:
      - rabbitmq

  attendance-service:
    build: ./services/attendance-service
    container_name: atlas-attendance-service
    ports:
      - "8005:8005"
    environment:
      - POSTGRES_URL=host=postgres user=atlas_user password=REDACTED_DATABASE_PASSWORD dbname=atlas_db port=5432 sslmode=disable
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  leave-service:
    build: ./services/leave-service
    container_name: atlas-leave-service
    ports:
      - "8006:8006"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/atlas_db
      - SPRING_DATASOURCE_USERNAME=atlas_user
      - SPRING_DATASOURCE_PASSWORD=REDACTED_DATABASE_PASSWORD
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: atlas-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    networks:
      - atlas-network
    depends_on:
      - api-gateway

networks:
  atlas-network:
    driver: bridge

volumes:
  atlas_postgres_data:
  mongo_data:
  elastic_data:

