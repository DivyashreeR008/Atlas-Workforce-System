# ⚠️  WARNING: Default passwords and secrets are for DEVELOPMENT ONLY.
# Before deploying to production, set ALL of the following environment variables:
#   JWT_SECRET, INTERNAL_JWT_SECRET, POSTGRES_PASSWORD, MONGO_PASSWORD,
#   MONGO_USER, REDIS_PASSWORD, RABBITMQ_USER, RABBITMQ_PASS,
#   ADMIN_DEFAULT_PASSWORD, AUDIT_INTERNAL_KEY, SCIM_API_KEY, SECURITY_INTERNAL_KEY.
# Generate strong secrets: openssl rand -base64 64
services:
  postgres:
    image: postgres:15-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_password}
      POSTGRES_DB: ${POSTGRES_DB:-atlas_db}
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas_user} -d ${POSTGRES_DB:-atlas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: atlas-mongodb
    user: "1001:1001"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_mongo_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-atlas_db}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - atlas-network

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_pass}
    user: "1001:1001"
    ports:
      - "6379:6379"
    networks:
      - atlas-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: atlas-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-atlas_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme_rabbit_pass}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - atlas-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: atlas-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - atlas-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: atlas-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - atlas-network

  employee-lifecycle-service:
    build:
      context: .
      dockerfile: services/employee-lifecycle-service/Dockerfile
    container_name: atlas-employee-lifecycle-service
    ports:
      - "8020:8020"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  integration-service:
    build:
      context: .
      dockerfile: services/integration-service/Dockerfile
    container_name: atlas-integration-service
    ports:
      - "8016:8016"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      - INTERNAL_API_KEY=${AUDIT_INTERNAL_KEY:-atlas-internal-key-change-me}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      rabbitmq:
        condition: service_started

  api-gateway:
    build: ./services/api-gateway-node
    container_name: atlas-api-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-long-random-string}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - AUTH_SERVICE_URL=http://auth-service:8010
      - EMPLOYEE_SERVICE_URL=http://employee-service:8001
      - PAYROLL_SERVICE_URL=http://payroll-service:8002
      - ANALYTICS_SERVICE_URL=http://analytics-service:8003
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
      - ATTENDANCE_SERVICE_URL=http://attendance-service:8005
      - LEAVE_SERVICE_URL=http://leave-service:8006
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis_pass}@redis:6379
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET:-atlas-internal-jwt-secret-change-me}
      - ATS_SERVICE_URL=http://ats-service:8012
      - LMS_SERVICE_URL=http://lms-service:8013
      - PERFORMANCE_SERVICE_URL=http://performance-service:8014
      - AI_COPILOT_SERVICE_URL=http://ai-copilot-service:8015
      - AUDIT_COMPLIANCE_SERVICE_URL=http://audit-compliance-service:8011
      - INTEGRATION_SERVICE_URL=http://integration-service:8016
      - EMPLOYEE_LIFECYCLE_SERVICE_URL=http://employee-lifecycle-service:8020
      - SECURITY_SERVICE_URL=http://security-service:8050
      - AI_SERVICE_URL=http://ai-service:8065
      - AUDIT_INTERNAL_KEY=${AUDIT_INTERNAL_KEY:-atlas-internal-key-change-me}
    networks:
      - atlas-network
    depends_on:
      - auth-service
      - employee-service
      - payroll-service
      - attendance-service
      - leave-service
      - redis
      - audit-compliance-service
      - ats-service
      - lms-service
      - performance-service
      - ai-copilot-service
      - ai-service
      - security-service
      - employee-lifecycle-service

  auth-service:
    build: ./services/auth-service
    container_name: atlas-auth-service
    ports:
      - "8010:8010"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-long-random-string}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-ChangeMe123!}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - NODE_ENV=${NODE_ENV:-development}
      - AUDIT_INTERNAL_KEY=${AUDIT_INTERNAL_KEY:-atlas-internal-key-change-me}
      - SCIM_API_KEY=${SCIM_API_KEY:-change-scim-api-key-in-production}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  employee-service:
    build:
      context: .
      dockerfile: services/employee-python-service/Dockerfile
    container_name: atlas-employee-service
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme_mongo_pass}@mongodb:27017/${MONGO_DB:-atlas_db}?authSource=admin
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    networks:
      - atlas-network
    depends_on:
      - mongodb
      - rabbitmq

  payroll-service:
    build: ./services/payroll-java-service
    container_name: atlas-payroll-service
    ports:
      - "8002:8002"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-atlas_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-atlas_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-atlas_password}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-python-service/Dockerfile
    container_name: atlas-analytics-service
    ports:
      - "8003:8003"
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: ./services/notification-go-service
    container_name: atlas-notification-service
    ports:
      - "8004:8004"
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET:-atlas-internal-jwt-secret-change-me}
    networks:
      - atlas-network
    depends_on:
      - rabbitmq

  attendance-service:
    build: ./services/attendance-service
    container_name: atlas-attendance-service
    ports:
      - "8005:8005"
    environment:
      - POSTGRES_URL=host=postgres user=${POSTGRES_USER:-atlas_user} password=${POSTGRES_PASSWORD:-atlas_password} dbname=${POSTGRES_DB:-atlas_db} port=5432 sslmode=disable
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET:-atlas-internal-jwt-secret-change-me}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  leave-service:
    build: ./services/leave-service
    container_name: atlas-leave-service
    ports:
      - "8006:8006"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-atlas_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-atlas_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-atlas_password}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  audit-compliance-service:
    build:
      context: .
      dockerfile: services/audit-compliance-service/Dockerfile
    container_name: atlas-audit-compliance-service
    ports:
      - "8011:8011"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - INTERNAL_API_KEY=${AUDIT_INTERNAL_KEY:-atlas-internal-key-change-me}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  ats-service:
    build:
      context: .
      dockerfile: services/ats-service/Dockerfile
    container_name: atlas-ats-service
    ports:
      - "8012:8012"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  lms-service:
    build: ./services/lms-service
    container_name: atlas-lms-service
    ports:
      - "8013:8013"
    environment:
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER:-atlas_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-atlas_password}
      - DB_NAME=${POSTGRES_DB:-atlas_db}
      - DB_PORT=5432
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET:-atlas-internal-jwt-secret-change-me}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  performance-service:
    build: ./services/performance-service
    container_name: atlas-performance-service
    ports:
      - "8014:8014"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-atlas_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-atlas_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-atlas_password}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  security-service:
    build:
      context: .
      dockerfile: services/security-service/Dockerfile
    container_name: atlas-security-service
    ports:
      - "8050:8050"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@postgres:5432/${POSTGRES_DB:-atlas_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - INTERNAL_API_KEY=${SECURITY_INTERNAL_KEY:-atlas-security-key-change-me}
    networks:
      - atlas-network
    depends_on:
      postgres:
        condition: service_healthy

  ai-copilot-service:
    build:
      context: .
      dockerfile: services/ai-copilot-service/Dockerfile
    container_name: atlas-ai-copilot-service
    ports:
      - "8015:8015"
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - atlas-network
    depends_on:
      - redis

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: atlas-ai-service
    ports:
      - "8065:8065"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - atlas-network

  frontend:
    build: ./frontend
    container_name: atlas-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    networks:
      - atlas-network
    depends_on:
      - api-gateway

networks:
  atlas-network:
    driver: bridge

volumes:
  atlas_postgres_data:
  mongo_data:
