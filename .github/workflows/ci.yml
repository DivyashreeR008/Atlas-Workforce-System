name: Enterprise Polyglot CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  frontend-check:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint || echo "Lint warning"
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api

  node-services-check:
    name: Node Services CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway-node, auth-service]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}
      - name: Check code
        run: node -check index.js || true
        working-directory: services/${{ matrix.service }}

  go-services-check:
    name: Go Services CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [notification-go-service, attendance-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
      - name: Install dependencies
        run: go mod download
        working-directory: services/${{ matrix.service }}
      - name: Compile check
        run: go build -v ./...
        working-directory: services/${{ matrix.service }}

  python-services-check:
    name: Python Services CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [employee-python-service, analytics-python-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: services/${{ matrix.service }}
      - name: Install linting tools
        run: |
          pip install flake8 pytest
        working-directory: services/${{ matrix.service }}
      - name: Lint Python
        run: flake8 .
        working-directory: services/${{ matrix.service }}
      - name: Test Python
        run: pytest
        working-directory: services/${{ matrix.service }}

  java-services-check:
    name: Java Services CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [payroll-java-service, leave-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Compile and package
        run: mvn clean package -DskipTests
        working-directory: services/${{ matrix.service }}
