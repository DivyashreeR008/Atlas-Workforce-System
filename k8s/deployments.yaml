apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: atlas/api-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: atlas-secrets
---
apiVersion: apps/v1
kind: Deployment
